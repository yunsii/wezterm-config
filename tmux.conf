set -g @tmux_status_padding " "
set -g @tmux_status_separator " · "
set -g @tmux_status_render_repo "1"
set -g @tmux_status_render_worktree "1"
set -g @tmux_status_render_branch "1"
set -g @tmux_status_render_git_changes "1"
set -g @tmux_status_render_node "1"
set -g @tmux_status_render_wakatime "1"
set -g @tmux_status_poll_interval "30"
set -g @tmux_status_line_0 ""
set -g @tmux_status_line_1 ""
set -g @tmux_status_line_2 ""
set -g @tmux_status_last_refresh "0"

if -F '#{==:#{@wezterm_runtime_root},}' 'set-option -F -g @wezterm_runtime_root "#{d:current_file}"'
set -s user-keys[0] "\e[20099~"

set -g status 3
set -g status-position bottom
set -g status-interval 30
set -s set-clipboard external
set -g mouse on
set -g focus-events on
set -g allow-passthrough on

bind-key -n MouseDown1Pane select-pane -t =
unbind -T root MouseDrag1Pane
unbind -T root MouseDragEnd1Pane
unbind -T root DoubleClick1Pane
unbind -T root TripleClick1Pane
bind-key -n WheelUpPane select-pane -t = \; if -F '#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'copy-mode -e'
bind-key -n S-MouseDrag1Pane select-pane -t = \; copy-mode -M

bind-key -T copy-mode MouseDrag1Pane send-keys -X clear-selection
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X clear-selection
bind-key -T copy-mode MouseDown1Pane select-pane \; if -F '#{selection_present}' 'if -F "#{!=:#{scroll_position},0}" "send-keys -X clear-selection" "send-keys -X cancel"' 'send-keys -X copy-cursor'
unbind -T copy-mode DoubleClick1Pane
unbind -T copy-mode TripleClick1Pane
bind-key -T copy-mode S-MouseDrag1Pane select-pane \; send-keys -X begin-selection
bind-key -T copy-mode S-MouseDragEnd1Pane send-keys -X stop-selection
unbind -T copy-mode S-MouseUp1Pane
bind-key -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line
bind-key -T copy-mode Enter send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode C-c if -F '#{selection_present}' 'send-keys -X copy-selection-no-clear' 'send-keys -X cancel'

bind-key -T copy-mode-vi MouseDrag1Pane send-keys -X clear-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X clear-selection
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; if -F '#{selection_present}' 'if -F "#{!=:#{scroll_position},0}" "send-keys -X clear-selection" "send-keys -X cancel"' 'send-keys -X copy-cursor'
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane
bind-key -T copy-mode-vi S-MouseDrag1Pane select-pane \; send-keys -X begin-selection
bind-key -T copy-mode-vi S-MouseDragEnd1Pane send-keys -X stop-selection
unbind -T copy-mode-vi S-MouseUp1Pane
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi C-c if -F '#{selection_present}' 'send-keys -X copy-selection-no-clear' 'send-keys -X cancel'

set -g status-style "bg=#f1f0e9,fg=#393a34"
set -g status-left-length 0
set -g status-right-length 0
set -g status-left ""
set -g status-right ""
set -g status-format[0] "#[fg=#393a34,bold] #(bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --session #{q:session_name} --window #{q:window_id} --cwd #{q:pane_current_path} --print-line 0) "
set -g status-format[1] "#[fg=#6a6257] #(bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-active-line.sh 1 #{q:session_name}) "
set -g status-format[2] "#[fg=#6a6257] #(bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-active-line.sh 2 #{q:session_name}) "

set-hook -g client-attached "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --client #{q:hook_client} --force --refresh-client >/dev/null 2>&1\""
set-hook -g client-focus-in "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --client #{q:hook_client} --force --refresh-client >/dev/null 2>&1\""
set-hook -g client-session-changed "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --client #{q:hook_client} --force --refresh-client >/dev/null 2>&1\""
set-hook -g session-window-changed "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --window #{q:hook_window} --force --refresh-client >/dev/null 2>&1\""
set-hook -g window-pane-changed "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --pane #{q:hook_pane} --force --refresh-client >/dev/null 2>&1\""

set -g window-status-format ""
set -g window-status-current-format ""
set -g window-style "fg=default,bg=#f1f0e9"
set -g window-active-style "fg=default,bg=#f1f0e9"

set -g automatic-rename off
set -g pane-border-status off
set -g pane-border-style "fg=#e6e1d7"
set -g pane-active-border-style "fg=#e6e1d7"
set -g display-time 1200

# `source-file` only overwrites matching keys; it does not garbage-collect old
# bindings. Clear the managed WezTerm/tmux surface first so keymap refactors do
# not leave stale transports or chord keys behind in a long-lived tmux server.
unbind -n M-v
unbind -n M-g
unbind -n M-G
unbind -n F12
unbind -n User0
unbind -n C-k
unbind -T wezterm-chord -a

bind-key -n M-v run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/open-current-dir-in-vscode.sh --window #{window_id} -- #{q:pane_current_path}"
bind-key -n M-g run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-worktree-menu.sh #{q:session_name} #{window_id} #{q:pane_current_path}"
bind-key -n M-G run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-worktree-cycle.sh #{q:session_name} #{window_id} #{q:pane_current_path}"
bind-key -n User0 run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-command-menu.sh #{q:session_name} #{window_id} #{q:pane_current_path} user0_transport"
bind-key -n C-k run-shell "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-chord-hint.sh start '(Ctrl+K) was pressed. Waiting for second key of chord...' #{q:session_name}" \; switch-client -T wezterm-chord
bind-key -T wezterm-chord v run-shell "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-chord-hint.sh clear #{q:session_name}" \; split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T wezterm-chord h run-shell "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-chord-hint.sh clear #{q:session_name}" \; split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T wezterm-chord x run-shell "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-chord-hint.sh clear #{q:session_name}" \; run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-command-run.sh #{q:session_name} force-close-vscode-windows #{window_id} #{q:pane_current_path}" \; switch-client -T root
bind-key -T wezterm-chord Escape run-shell "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-chord-hint.sh clear #{q:session_name}" \; switch-client -T root
bind-key -T wezterm-chord C-k run-shell "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-chord-hint.sh clear #{q:session_name}" \; switch-client -T root
bind-key -T wezterm-chord Any run-shell "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-chord-hint.sh clear #{q:session_name}" \; switch-client -T root

run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --force --refresh-client >/dev/null 2>&1"
