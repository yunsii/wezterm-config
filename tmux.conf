set -g @tmux_status_padding " "
set -g @tmux_status_separator " · "
set -g @tmux_status_render_repo "1"
set -g @tmux_status_render_worktree "1"
set -g @tmux_status_render_branch "1"
set -g @tmux_status_render_git_changes "1"
set -g @tmux_status_render_node "1"
set -g @tmux_status_render_wakatime "1"
set -g @tmux_status_poll_interval "30"
set -g @tmux_status_line_0 ""
set -g @tmux_status_line_1 ""
set -g @tmux_status_line_2 ""
set -g @tmux_status_last_refresh "0"

if -F '#{==:#{@wezterm_runtime_root},}' 'set-option -F -g @wezterm_runtime_root "#{d:current_file}"'
set -s user-keys[0] "\e[20099~"
set -s user-keys[1] "\e[20100~"
set -s user-keys[2] "\e[20101~"

set -g status 3
set -g status-position bottom
set -g status-interval 30
set -s set-clipboard external
set -g mouse on
set -g focus-events on
set -g allow-passthrough all
# Advertise DEC mode 2026 (synchronized output / BSU+ESU) to inner apps.
# Claude Code's renderer probes the outer terminal via terminfo and only
# emits \E[?2026h ... \E[?2026l around frames when Sync is declared; this
# lets wezterm batch the GUI paint into one atomic frame, keeping the IME
# candidate-window anchor stable through diff updates. Requires tmux 3.6+
# (3.4 stalls idle renders waiting on ESU; 3.6 added a 1s flush timeout).
# Investigation: docs/ime-flicker-and-sync-output.md.
set -as terminal-features ',xterm*:sync,wezterm*:sync'
# Lower the meta-key disambiguation timeout from the 500ms default. tmux
# holds bare Esc for `escape-time` ms to see if it is the prefix of a
# Meta sequence (Alt+key arrives as `\x1b<key>` over the wire); during
# that window nothing downstream — including a `display-popup -E`
# subprocess like the attention picker — sees the Esc. Result: pressing
# Esc to close the popup felt ~500ms slower than pressing Alt+/ again
# (whose two bytes arrive together inside the same window and are
# released without waiting). 10ms is well below human perception while
# still tolerating slow PTY links (ssh, serial); 0 is risky on flaky
# transports because legitimate Alt+key sequences can fragment.
set -sg escape-time 10
# Propagate WEZTERM_PANE into tmux sessions so hooks (Claude Code, etc.) can
# tag attention entries with the owning WezTerm pane. Without this, hook
# subprocesses see WEZTERM_PANE as empty and the Alt+/ overlay cannot resolve
# workspace / tab information for the entry.
set -ga update-environment 'WEZTERM_PANE'

# Keep tmux's own window / pane indices 1-based so the status line matches
# natural counting. `renumber-windows` keeps the sequence contiguous after a
# window is closed. WezTerm owns cross-tab navigation (`Alt+n`, `Alt+1..9`), so
# these indices are only referenced by tmux's `prefix` commands.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

bind-key -n MouseDown1Pane select-pane -t =
unbind -T root MouseDrag1Pane
unbind -T root MouseDragEnd1Pane
unbind -T root DoubleClick1Pane
unbind -T root TripleClick1Pane
bind-key -n WheelUpPane select-pane -t = \; if -F '#{||:#{alternate_on},#{pane_in_mode}}' 'send-keys -M' 'copy-mode'
bind-key -n PageUp if -F '#{||:#{alternate_on},#{pane_in_mode}}' 'send-keys PageUp' 'copy-mode'
bind-key -n S-Up if -F '#{||:#{alternate_on},#{pane_in_mode}}' 'send-keys S-Up' 'copy-mode'
unbind -n S-Down
bind-key -n S-MouseDrag1Pane select-pane -t = \; copy-mode -M

bind-key -T copy-mode MouseDrag1Pane send-keys -X clear-selection
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X clear-selection
bind-key -T copy-mode MouseDown1Pane select-pane \; if -F '#{selection_present}' 'if -F "#{!=:#{scroll_position},0}" "send-keys -X clear-selection" "send-keys -X cancel"' 'send-keys -X copy-cursor'
unbind -T copy-mode DoubleClick1Pane
unbind -T copy-mode TripleClick1Pane
bind-key -T copy-mode S-MouseDrag1Pane select-pane \; send-keys -X begin-selection
bind-key -T copy-mode S-MouseDragEnd1Pane send-keys -X stop-selection
unbind -T copy-mode S-MouseUp1Pane
bind-key -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line
bind-key -T copy-mode Enter if -F '#{selection_present}' 'send-keys -X copy-pipe-and-cancel' 'send-keys -X cancel'
bind-key -T copy-mode C-c if -F '#{selection_present}' 'send-keys -X copy-selection-no-clear' 'send-keys -X cancel'
bind-key -T copy-mode S-Up send-keys -X -N 3 scroll-up
bind-key -T copy-mode S-Down if -F '#{==:#{scroll_position},0}' 'send-keys -X cancel' 'send-keys -X -N 3 scroll-down'
bind-key -T copy-mode PageUp send-keys -X page-up
bind-key -T copy-mode PageDown if -F '#{==:#{scroll_position},0}' 'send-keys -X cancel' 'send-keys -X page-down'
bind-key -T copy-mode WheelDownPane if -F '#{==:#{scroll_position},0}' 'send-keys -X cancel' 'send-keys -X -N 5 scroll-down'
bind-key -T copy-mode M-v run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/open-current-dir-in-vscode.sh --window #{window_id} -- #{q:pane_current_path}"

bind-key -T copy-mode-vi MouseDrag1Pane send-keys -X clear-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X clear-selection
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; if -F '#{selection_present}' 'if -F "#{!=:#{scroll_position},0}" "send-keys -X clear-selection" "send-keys -X cancel"' 'send-keys -X copy-cursor'
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane
bind-key -T copy-mode-vi S-MouseDrag1Pane select-pane \; send-keys -X begin-selection
bind-key -T copy-mode-vi S-MouseDragEnd1Pane send-keys -X stop-selection
unbind -T copy-mode-vi S-MouseUp1Pane
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line
bind-key -T copy-mode-vi Enter if -F '#{selection_present}' 'send-keys -X copy-pipe-and-cancel' 'send-keys -X cancel'
bind-key -T copy-mode-vi C-c if -F '#{selection_present}' 'send-keys -X copy-selection-no-clear' 'send-keys -X cancel'
bind-key -T copy-mode-vi S-Up send-keys -X -N 3 scroll-up
bind-key -T copy-mode-vi S-Down if -F '#{==:#{scroll_position},0}' 'send-keys -X cancel' 'send-keys -X -N 3 scroll-down'
bind-key -T copy-mode-vi PageUp send-keys -X page-up
bind-key -T copy-mode-vi PageDown if -F '#{==:#{scroll_position},0}' 'send-keys -X cancel' 'send-keys -X page-down'
bind-key -T copy-mode-vi WheelDownPane if -F '#{==:#{scroll_position},0}' 'send-keys -X cancel' 'send-keys -X -N 5 scroll-down'
bind-key -T copy-mode-vi M-v run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/open-current-dir-in-vscode.sh --window #{window_id} -- #{q:pane_current_path}"

set -g status-style "bg=#f1f0e9,fg=#393a34"
set -g status-left-length 0
set -g status-right-length 0
set -g status-left ""
set -g status-right ""
set -g status-format[0] "#[fg=#393a34,bold] #(bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --session #{q:session_name} --window #{q:window_id} --cwd #{q:pane_current_path} --print-line 0) "
set -g status-format[1] "#[fg=#6a6257] #(bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-active-line.sh 1 #{q:session_name}) "
set -g status-format[2] "#[fg=#6a6257] #(bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-active-line.sh 2 #{q:session_name}) "

set-hook -g client-attached "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --client #{q:hook_client} --force --refresh-client >/dev/null 2>&1\""
set-hook -g client-focus-in "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --client #{q:hook_client} --force --refresh-client >/dev/null 2>&1\""
set-hook -g client-session-changed "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --client #{q:hook_client} --force --refresh-client >/dev/null 2>&1\""
set-hook -g session-window-changed "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --window #{q:hook_window} --force --refresh-client >/dev/null 2>&1\""
set-hook -g window-pane-changed "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --pane #{q:hook_pane} --force --refresh-client >/dev/null 2>&1\""

# Record active tmux pane per (socket, session) so attention.lua's focus-
# based auto-ack requires tmux-pane-level focus, not just WezTerm-pane
# focus. Three hooks are needed:
#   - after-select-pane covers programmatic / in-tmux select-pane calls
#   - pane-focus-in is set per-pane via the new-session / split-window
#     hooks below because tmux 3.4 silently ignores `set-hook -g
#     pane-focus-in` (the hook only exists in pane scope) — it covers
#     focus changes between panes inside one tmux client
#   - client-focus-in covers wezterm-side tab / workspace switches that
#     give the tmux client OS-level focus without changing the in-tmux
#     active pane; without it the focus file stays frozen at the last
#     in-tmux switch and is_entry_focused misses the agent pane the user
#     just landed on via Alt+1 / Alt+p / etc.
# See scripts/runtime/tmux-focus-emit.sh and wezterm-x/lua/attention.lua.
set-hook -g after-select-pane "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-focus-emit.sh #{q:socket_path} #{q:session_name} #{q:pane_id} >/dev/null 2>&1\""
set-hook -ga client-focus-in "run-shell -b \"bash #{@wezterm_runtime_root}/scripts/runtime/tmux-focus-emit.sh #{q:socket_path} #{q:session_name} #{q:pane_id} >/dev/null 2>&1\""

set -g window-status-format ""
set -g window-status-current-format ""
set -g window-style "fg=default,bg=#eae9e1"
set -g window-active-style "fg=default,bg=#f1f0e9"

set -g automatic-rename off
set -g pane-border-status off
set -g pane-border-style "fg=#e6e1d7"
set -g pane-active-border-style "fg=#e6e1d7"
set -g display-time 1200

# `source-file` only overwrites matching keys; it does not garbage-collect old
# bindings. Clear the managed WezTerm/tmux surface first so keymap refactors do
# not leave stale transports or chord keys behind in a long-lived tmux server.
unbind -n M-v
unbind -n M-g
unbind -n M-G
unbind -n M-/
unbind -n M-o
unbind -n M-n
unbind -n M-N
unbind -n M-1
unbind -n M-2
unbind -n M-3
unbind -n M-4
unbind -n M-5
unbind -n M-6
unbind -n M-7
unbind -n M-8
unbind -n M-9
unbind -n F12
unbind -n User0

bind-key -n M-v run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/open-current-dir-in-vscode.sh --window #{window_id} -- #{q:pane_current_path}"
bind-key -n M-g run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-worktree-menu.sh #{q:session_name} #{window_id} #{q:pane_current_path}"
bind-key -n M-G run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-worktree-cycle.sh #{q:session_name} #{window_id} #{q:pane_current_path}"
bind-key -n M-/ run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-attention-menu.sh"
# Alt+o. WezTerm's keymap bumps the hotkey counter before forwarding this
# sequence (see wezterm-x/lua/ui/keymaps.lua + usage.lua), so this binding
# only runs the rotate action to avoid double-counting.
bind-key -n M-o select-pane -t :.+
bind-key -n User0 run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-command-menu.sh #{q:session_name} #{window_id} #{q:pane_current_path} user0_transport #{q:client_tty}"
bind-key -n User1 run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/attention-jump.sh next-waiting"
bind-key -n User2 run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/attention-jump.sh next-done"

# Chord bindings are generated from wezterm-x/commands/manifest.json (and the
# optional per-machine overrides in wezterm-x/local/keybindings.lua) by
# scripts/runtime/render-tmux-bindings.sh. The generated file takes care of
# `unbind -n C-k` and resetting the command-chord / worktree-chord tables,
# so we don't repeat those here. Rerun `wezterm-runtime-sync` after editing
# the manifest or overrides to regenerate.
source-file -q "#{@wezterm_runtime_root}/wezterm-x/tmux/chord-bindings.generated.conf"

run-shell -b "bash #{@wezterm_runtime_root}/scripts/runtime/tmux-status-refresh.sh --force --refresh-client >/dev/null 2>&1"
