set -g @tmux_status_padding " "
set -g @tmux_status_separator " · "
set -g @tmux_status_render_repo "1"
set -g @tmux_status_render_branch "1"
set -g @tmux_status_render_git_changes "1"
set -g @tmux_status_render_node "1"
set -g @tmux_status_render_wakatime "1"

if -F '#{==:#{@wezterm_repo_root},}' 'set-option -F -g @wezterm_repo_root "#{d:current_file}"'

set -g status 2
set -g status-position bottom
set -g status-interval 5
set -g mouse on
set -g allow-passthrough on

set -g status-style "bg=#f1f0e9,fg=#393a34"
set -g status-left-length 0
set -g status-right-length 0
set -g status-left ""
set -g status-right ""
set -g status-format[0] "#(bash -lc 'TMUX_STATUS_RENDER_REPO=\"#{@tmux_status_render_repo}\" TMUX_STATUS_RENDER_BRANCH=\"#{@tmux_status_render_branch}\" TMUX_STATUS_RENDER_GIT_CHANGES=\"#{@tmux_status_render_git_changes}\" TMUX_STATUS_RENDER_NODE=\"#{@tmux_status_render_node}\" TMUX_STATUS_RENDER_WAKATIME=\"#{@tmux_status_render_wakatime}\" bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-layout.sh \"#{pane_current_path}\" >/dev/null 2>&1')#[fg=#393a34,bold] #(bash -lc 'TMUX_STATUS_PADDING=\"#{@tmux_status_padding}\" TMUX_STATUS_SEPARATOR=\"#{@tmux_status_separator}\" TMUX_STATUS_RENDER_REPO=\"#{@tmux_status_render_repo}\" TMUX_STATUS_RENDER_BRANCH=\"#{@tmux_status_render_branch}\" TMUX_STATUS_RENDER_GIT_CHANGES=\"#{@tmux_status_render_git_changes}\" TMUX_STATUS_RENDER_NODE=\"#{@tmux_status_render_node}\" TMUX_STATUS_RENDER_WAKATIME=\"#{@tmux_status_render_wakatime}\" bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-active-line.sh 0 \"#{pane_current_path}\"') "
set -g status-format[1] "#[fg=#6a6257] #(bash -lc 'TMUX_STATUS_PADDING=\"#{@tmux_status_padding}\" TMUX_STATUS_SEPARATOR=\"#{@tmux_status_separator}\" TMUX_STATUS_RENDER_REPO=\"#{@tmux_status_render_repo}\" TMUX_STATUS_RENDER_BRANCH=\"#{@tmux_status_render_branch}\" TMUX_STATUS_RENDER_GIT_CHANGES=\"#{@tmux_status_render_git_changes}\" TMUX_STATUS_RENDER_NODE=\"#{@tmux_status_render_node}\" TMUX_STATUS_RENDER_WAKATIME=\"#{@tmux_status_render_wakatime}\" bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-active-line.sh 1 \"#{pane_current_path}\"') "

set -g window-status-format ""
set -g window-status-current-format ""
set -g window-style "fg=default,bg=#f1f0e9"
set -g window-active-style "fg=default,bg=#f1f0e9"

set -g automatic-rename off
set -g pane-border-status off
set -g pane-border-style "fg=#e6e1d7"
set -g pane-active-border-style "fg=#e6e1d7"
set -g display-time 1200

bind-key -n M-o run-shell -b "bash #{@wezterm_repo_root}/scripts/runtime/open-current-dir-in-vscode.sh #{q:pane_current_path}"

run-shell -b "bash -lc 'TMUX_STATUS_RENDER_REPO=\"#{@tmux_status_render_repo}\" TMUX_STATUS_RENDER_BRANCH=\"#{@tmux_status_render_branch}\" TMUX_STATUS_RENDER_GIT_CHANGES=\"#{@tmux_status_render_git_changes}\" TMUX_STATUS_RENDER_NODE=\"#{@tmux_status_render_node}\" TMUX_STATUS_RENDER_WAKATIME=\"#{@tmux_status_render_wakatime}\" bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-layout.sh >/dev/null 2>&1'"
