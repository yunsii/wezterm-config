<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="WezDeck">
  <title>WezDeck</title>
  <defs>
    <linearGradient id="deck" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e3a4d"/>
      <stop offset="1" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a5870"/>
      <stop offset="1" stop-color="#14192a"/>
    </linearGradient>
  </defs>
  <rect x="2.5" y="2.5" width="27" height="27" rx="5" fill="url(#edge)"/>
  <rect x="3.5" y="3.5" width="25" height="25" rx="4" fill="url(#deck)"/>
  <!-- diagonal lit slots: running / waiting / done (positions + radius match icon.svg slot geometry) -->
  <circle cx="9.5" cy="9.5" r="2.25" fill="#22d3ee"/>
  <circle cx="16" cy="16" r="2.25" fill="#f59e0b"/>
  <circle cx="22.5" cy="22.5" r="2.25" fill="#34d399"/>
</svg>
